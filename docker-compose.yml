services:
  postgres:
    image: postgres:18-alpine
    command: >
      postgres
      -c checkpoint_completion_target=0.9
      -c checkpoint_timeout=15min
      -c max_wal_size=2GB
      -c wal_level=logical
      -c max_wal_senders=20
    # checkpoint_completion_target=0.9  — spreads checkpoint I/O over 90% of the checkpoint interval, reducing write spikes
    # checkpoint_timeout=15min          — less frequent checkpoints, fewer stall windows during heavy insert load
    # max_wal_size=2GB                  — gives WAL more room before forcing an emergency checkpoint
    # wal_level=logical                 — required for LISTEN/NOTIFY to work correctly under replication setups
    # max_wal_senders=20                — allows more concurrent NOTIFY listeners without Postgres throttling
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-1:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    command: ["sh", "-c", "node scripts/migrate.js && node dist/main.js"]

  app-2:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  app-3:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3

volumes:
  postgres_data:
